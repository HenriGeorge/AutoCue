<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AutoCue — Nightboard (Concept D)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════
   AutoCue design tokens (lifted from docs/design/tokens/colors.css)
   ════════════════════════════════════════════════════════════ */
:root{
  --bg:#fafafa; --surface:#ffffff; --surface-2:#f2f2f2; --border:#e8e8e8; --border-hover:#c8c8c8;
  --text:#1a1a1a; --muted:#737373; --muted-soft:#a3a3a3;
  --green:#159a05; --green-dim:#0f6e03; --green-wash:rgba(21,154,5,.08); --green-ring:rgba(21,154,5,.14);
  --ink:#0a0a0a; --ink-hover:#2a2a2a; --on-ink:#fafafa;
  --danger:#e74c3c; --warn:#f0801a; --warn-amber:#ffa000; --rating:#f0b429;
  --cue-a:#18a80c; --cue-b:#2246e0; --cue-c:#0099bb; --cue-d:#c07800;
  --cue-e:#c84800; --cue-f:#c02010; --cue-g:#c8006a; --cue-h:#9900cc;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.03);
  --shadow-md:0 4px 14px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);
  --shadow-lg:0 10px 32px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.08);
  --glass-bg:rgba(255,255,255,.86);
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  /* zone washes — data-signal tints at ~5% */
  --zone-warmup:rgba(0,153,187,.05); --zone-build:rgba(192,120,0,.05);
  --zone-peak:rgba(192,32,16,.05);   --zone-closing:rgba(153,0,204,.05);
}
html.dark{
  --bg:#0c0a09; --surface:#1c1917; --surface-2:#231f1d; --border:#292524; --border-hover:#3d3830;
  --text:#fafaf9; --muted:#a8a29e; --muted-soft:#78716c;
  --green:#28e214; --green-dim:#1a9a0d; --green-wash:rgba(40,226,20,.08); --green-ring:rgba(40,226,20,.14);
  --ink:#fafafa; --ink-hover:#e2e2e2; --on-ink:#0a0a0a;
  --cue-a:#28e214; --cue-b:#305aff; --cue-c:#00e0ff; --cue-d:#ffa000;
  --cue-e:#ff6400; --cue-f:#e0301e; --cue-g:#f51e8c; --cue-h:#e600ff;
  --shadow-sm:0 1px 3px rgba(0,0,0,.3);
  --shadow-md:0 4px 12px rgba(0,0,0,.3);
  --shadow-lg:0 10px 32px rgba(0,0,0,.45),0 2px 8px rgba(0,0,0,.3);
  --glass-bg:rgba(12,10,9,.80);
  --zone-warmup:rgba(0,224,255,.05); --zone-build:rgba(255,160,0,.05);
  --zone-peak:rgba(224,48,30,.06);   --zone-closing:rgba(230,0,255,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--text); font-family:var(--font-sans);
  font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
  display:flex; flex-direction:column; min-height:100vh;
}
button{font-family:inherit;cursor:pointer}
.mono{font-family:var(--font-mono)}

/* ── Top bar ─────────────────────────────────────────────── */
#topbar{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:16px;
  padding:12px 28px;border-bottom:1px solid var(--border);
  background:var(--glass-bg);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-tile{width:32px;height:32px;border-radius:8px;background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
.brand-name{font-weight:700;letter-spacing:-.2px;font-size:15px}
.brand-name span{color:var(--muted);font-weight:500}
.set-name{
  font-weight:600;font-size:15px;letter-spacing:-.01em;border:1px solid transparent;
  border-radius:8px;padding:4px 10px;background:transparent;color:var(--text)
}
.set-name:hover{border-color:var(--border-hover)}
#set-stats{display:flex;gap:8px;align-items:center;margin-left:4px}
.stat-chip{
  font-family:var(--font-mono);font-size:11px;color:var(--muted);
  border:1px solid var(--border);border-radius:4px;padding:2px 7px;background:var(--surface)
}
.stat-chip b{color:var(--text);font-weight:500}
.stat-chip.health b{color:var(--green)}
#topbar .spacer{flex:1}
.ghost-pill{
  border:1px solid var(--border);background:var(--surface);color:var(--muted);
  border-radius:999px;padding:7px 14px;font-size:13px;font-weight:500;
  transition:all .18s ease;
}
.ghost-pill:hover{border-color:var(--border-hover);color:var(--text);transform:translateY(-1px)}
.primary{
  border:none;background:var(--ink);color:var(--on-ink);border-radius:999px;
  padding:9px 18px;font-size:13px;font-weight:600;transition:all .18s ease;box-shadow:var(--shadow-sm);
}
.primary:hover{background:var(--ink-hover);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.primary:active{transform:translateY(0)}

/* ── Canvas ──────────────────────────────────────────────── */
main{flex:1;display:flex;flex-direction:column;min-width:0}
#canvas-wrap{padding:26px 28px 8px;overflow-x:auto}
#canvas{position:relative;min-width:1240px;border:1px solid var(--border);
  border-radius:16px;background:var(--surface);box-shadow:var(--shadow-sm);
  padding:18px 22px 16px;overflow:hidden}
.canvas-eyebrow{font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted-soft);font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between}
.canvas-eyebrow .hint{text-transform:none;letter-spacing:0;font-weight:400;font-size:11px}

/* zone bands sit behind arc + tiles */
#zones{position:absolute;inset:0;display:flex;pointer-events:none}
.zone{position:relative;height:100%}
.zone-label{position:absolute;top:8px;left:10px;font-size:10px;letter-spacing:.08em;
  text-transform:uppercase;font-weight:600;color:var(--muted-soft)}
.zone+.zone{border-left:1px dashed var(--border)}
.z-warmup{background:var(--zone-warmup)} .z-build{background:var(--zone-build)}
.z-peak{background:var(--zone-peak)}     .z-closing{background:var(--zone-closing)}

#arc-row{position:relative;height:84px;margin:18px 0 10px}
#arc{position:absolute;inset:0;width:100%;height:100%}

/* timeline of tiles + joints */
#timeline{position:relative;display:flex;align-items:stretch;gap:0;z-index:2}
#timeline::before{ /* the mix "wire" the joints sit on */
  content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:var(--border-hover);z-index:0;
}
.tile{
  position:relative;z-index:1;flex:1 1 0;min-width:168px;height:186px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  display:flex;flex-direction:column;padding:10px 12px 9px;gap:5px;
  transition:border-color .15s,box-shadow .15s,transform .15s;cursor:pointer;text-align:left;
}
.tile:hover{border-color:var(--border-hover);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.tile.selected{border-color:var(--green);box-shadow:0 0 0 3px var(--green-ring),var(--shadow-md)}
.tile-title{font-size:14px;font-weight:700;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tile-artist{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:-3px}
.chips{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.chip{font-family:var(--font-mono);font-size:10.5px;border-radius:4px;padding:1px 6px;border:1px solid var(--border);color:var(--muted)}
.chip.bpm{background:var(--green-wash);border-color:transparent;color:var(--green);font-weight:500}
.chip.cat{font-family:var(--font-sans);font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.tile-energy{flex:1;min-height:0;margin:2px -2px}
.tile-energy svg{width:100%;height:100%;display:block}
.tile-foot{display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:10.5px;color:var(--muted-soft)}
.cue-ok{color:var(--green)} .cue-warn{color:var(--warn-amber)}

/* joints */
.joint{
  align-self:center;z-index:3;flex:0 0 auto;width:46px;height:46px;margin:0 -8px;
  border-radius:999px;background:var(--surface);border:1.5px solid var(--border-hover);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--text);
  box-shadow:var(--shadow-sm);transition:transform .15s,box-shadow .15s;
}
.joint small{font-size:8px;font-weight:400;color:var(--muted-soft);margin-top:-2px}
.joint:hover{transform:scale(1.1);box-shadow:var(--shadow-md)}
.joint.s-good{border-color:var(--green);color:var(--green)}
.joint.s-ok{border-color:var(--warn-amber);color:var(--warn-amber)}
.joint.s-bad{border-color:var(--danger);color:var(--danger)}
.joint.open{box-shadow:0 0 0 3px var(--green-ring),var(--shadow-md)}

/* ── Joint popover ───────────────────────────────────────── */
#popover{
  position:absolute;z-index:50;width:330px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;box-shadow:var(--shadow-lg);padding:14px 16px;display:none;
  animation:fadeUp .25s ease-out;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#popover .po-head{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
#popover .po-pair{font-size:13px;font-weight:600;letter-spacing:-.1px;flex:1}
#popover .po-score{font-family:var(--font-mono);font-size:16px;font-weight:700}
#popover .po-score small{font-size:10px;color:var(--muted);font-weight:400}
#popover ul{list-style:none;display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
#popover li{font-size:12.5px;color:var(--muted);display:flex;gap:7px;align-items:baseline}
#popover li::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--border-hover);flex:0 0 auto;position:relative;top:-1px}
#popover li.good::before{background:var(--green)}
#popover li.warn::before{background:var(--warn-amber)}
#popover li b{color:var(--text);font-weight:600}
#popover li .mono{font-size:12px}
.po-alt-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-soft);font-weight:600;margin-bottom:7px}
.po-alt{display:flex;align-items:center;gap:9px;padding:7px 8px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;transition:border-color .15s}
.po-alt:hover{border-color:var(--border-hover)}
.po-alt .a-meta{flex:1;min-width:0}
.po-alt .a-title{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.po-alt .a-sub{font-family:var(--font-mono);font-size:10.5px;color:var(--muted)}
.po-alt .a-score{font-family:var(--font-mono);font-size:13px;font-weight:700}
.swap-btn{border:1px solid var(--border);background:var(--surface);color:var(--muted);
  border-radius:999px;padding:4px 11px;font-size:11.5px;font-weight:500;transition:all .15s}
.swap-btn:hover{border-color:var(--green);color:var(--green)}
.po-tip{font-size:11.5px;color:var(--muted);border-top:1px solid var(--border);padding-top:9px;margin-top:4px}

/* ── Inspector (cue prep in context) ─────────────────────── */
#inspector{margin:14px 28px 0;border:1px solid var(--border);border-radius:16px;
  background:var(--surface);box-shadow:var(--shadow-sm);padding:16px 20px 18px;
  display:none;animation:fadeUp .3s ease-out}
#inspector.show{display:block}
.insp-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.insp-title{font-size:16px;font-weight:700;letter-spacing:-.2px}
.insp-artist{color:var(--muted);font-size:13px}
.insp-head .chips{margin-left:4px}
.insp-head .spacer{flex:1}
.insp-actions{display:flex;gap:8px}
.phrase-wrap{position:relative;margin:4px 0 6px}
.phrase-strip{display:flex;height:34px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.phrase-seg{display:flex;align-items:center;justify-content:center;font-size:10px;
  text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-right:1px solid var(--border);
  white-space:nowrap;overflow:hidden;background:var(--surface-2)}
.phrase-seg:last-child{border-right:none}
.phrase-seg.p-chorus{background:var(--green-wash);color:var(--green)}
.phrase-seg.p-build{background:rgba(255,160,0,.08);color:var(--warn-amber)}
.phrase-seg.p-break{background:rgba(0,224,255,.07)}
.cue-tick{position:absolute;top:-9px;bottom:-4px;width:0;pointer-events:none}
.cue-tick i{position:absolute;top:9px;bottom:4px;left:-1px;width:2px;border-radius:1px}
.cue-tick b{
  position:absolute;top:-6px;left:-9px;width:18px;height:18px;border-radius:4px;
  font-family:var(--font-mono);font-size:10px;font-weight:700;font-style:normal;
  display:flex;align-items:center;justify-content:center;border:1.5px solid;
  background:var(--surface);pointer-events:auto;cursor:default;
}
.cue-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px}
.cue-pill{display:flex;align-items:center;gap:6px;border:1px solid var(--border);
  border-radius:4px;padding:3px 8px;font-size:11px}
.cue-pill .ltr{font-family:var(--font-mono);font-weight:700;font-size:10.5px}
.cue-pill .nm{color:var(--muted)}
.cue-pill .tm{font-family:var(--font-mono);color:var(--muted-soft);font-size:10.5px}
.insp-tip{margin-top:13px;font-size:12.5px;color:var(--muted)}
.insp-tip b{color:var(--text)}

/* ── Tray (the crate shelf) ──────────────────────────────── */
#tray{
  position:sticky;bottom:0;z-index:30;margin-top:18px;
  border-top:1px solid var(--border);
  background:var(--glass-bg);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);
  padding:10px 28px 14px;transition:transform .3s ease;
}
#tray.collapsed .tray-row{display:none}
.tray-head{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.tray-eyebrow{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-soft);font-weight:600}
.tray-context{font-size:12.5px;color:var(--muted)}
.tray-context b{color:var(--text);font-weight:600}
.tray-head .spacer{flex:1}
.tray-toggle{border:none;background:none;color:var(--muted);font-size:12px;padding:4px 8px;border-radius:999px}
.tray-toggle:hover{color:var(--text)}
.tray-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:2px}
.crate-card{
  flex:0 0 236px;border:1px solid var(--border);border-radius:12px;background:var(--surface);
  padding:9px 11px;display:flex;flex-direction:column;gap:4px;transition:all .15s;
}
.crate-card:hover{border-color:var(--border-hover);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.crate-title{font-size:12.5px;font-weight:700;letter-spacing:-.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crate-artist{font-size:11px;color:var(--muted);margin-top:-3px}
.crate-reason{font-size:11px;color:var(--muted);min-height:28px}
.crate-reason .sim{font-family:var(--font-mono);color:var(--green);font-size:10.5px}
.crate-foot{display:flex;align-items:center;gap:5px}
.crate-foot .spacer{flex:1}
.add-btn{border:1px solid var(--border);background:var(--surface);color:var(--muted);
  border-radius:999px;padding:3px 10px;font-size:11px;font-weight:500;transition:all .15s}
.add-btn:hover{border-color:var(--green);color:var(--green)}

/* ── Toast ───────────────────────────────────────────────── */
#toast{
  position:fixed;left:50%;bottom:104px;transform:translateX(-50%) translateY(12px);
  background:var(--glass-bg);backdrop-filter:blur(14px);border:1px solid var(--border);
  border-radius:999px;padding:9px 18px;font-size:13px;box-shadow:var(--shadow-lg);
  opacity:0;pointer-events:none;transition:all .3s ease;z-index:60;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast .mono{color:var(--green);font-size:12px}

@media (prefers-reduced-motion: reduce){
  *{transition:none!important;animation:none!important}
}
</style>
</head>
<body>

<!-- ═══════ Top bar ═══════ -->
<header id="topbar">
  <div class="brand">
    <div class="brand-tile">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round">
        <line x1="4" y1="10" x2="4" y2="14"/><line x1="8" y1="7" x2="8" y2="17"/>
        <line x1="12" y1="4" x2="12" y2="20"/><line x1="16" y1="8" x2="16" y2="16"/><line x1="20" y1="11" x2="20" y2="13"/>
      </svg>
    </div>
    <div class="brand-name">AutoCue <span>/ Nightboard</span></div>
  </div>
  <input class="set-name" value="Saturday — Club Mira" spellcheck="false" aria-label="Set name">
  <div id="set-stats"><!-- filled by JS --></div>
  <div class="spacer"></div>
  <button class="ghost-pill" id="theme-toggle" aria-label="Toggle theme">☾ Dark</button>
  <button class="primary" id="export-btn">Export set + cues to Rekordbox</button>
</header>

<main>
  <!-- ═══════ The night canvas ═══════ -->
  <div id="canvas-wrap">
    <section id="canvas" aria-label="Set timeline">
      <div id="zones"></div>
      <div class="canvas-eyebrow" style="position:relative;z-index:2">
        <span>Set energy</span>
        <span class="hint">Click a joint to inspect the transition · click a tile to prep its cues</span>
      </div>
      <div id="arc-row"><svg id="arc" preserveAspectRatio="none" aria-hidden="true"></svg></div>
      <div id="timeline"></div>
      <div id="popover" role="dialog" aria-label="Transition detail"></div>
    </section>
  </div>

  <!-- ═══════ Inspector — cue prep in context ═══════ -->
  <section id="inspector" aria-label="Track inspector"></section>
</main>

<!-- ═══════ Crate tray ═══════ -->
<aside id="tray" aria-label="Crate suggestions">
  <div class="tray-head">
    <span class="tray-eyebrow">Crate</span>
    <span class="tray-context" id="tray-context"></span>
    <div class="spacer"></div>
    <button class="tray-toggle" id="tray-toggle">Hide ▾</button>
  </div>
  <div class="tray-row" id="tray-row"></div>
</aside>

<div id="toast" role="status" aria-live="polite"></div>

<script>
/* ════════════════════════════════════════════════════════════
   Data — a 6-track night + a crate pool.
   Energy = 12 samples 0..1. Phrases = [name, bars]. Cues are
   derived from phrase boundaries (A–H), like the product does.
   ════════════════════════════════════════════════════════════ */
function mkTrack(t){
  // derive A–H cues from phrase boundaries
  const total = t.phrases.reduce((s,p)=>s+p[1],0);
  let acc=0; t.cues=[];
  const letters='ABCDEFGH';
  t.phrases.forEach((p,i)=>{
    if(t.cues.length<8){ t.cues.push({slot:letters[t.cues.length], frac:acc/total, name:p[0]}); }
    acc+=p[1];
  });
  t.totalBars=total;
  return t;
}
let SET=[
 mkTrack({id:'t1',title:'Low Tide',artist:'Arlo Wren',bpm:121.8,key:'6A',dur:403,cat:'warmup',hasCues:true,
   energy:[.12,.16,.20,.24,.22,.28,.33,.36,.34,.38,.42,.40],
   phrases:[['Intro',16],['Verse',32],['Build',16],['Chorus',32],['Break',16],['Chorus',32],['Outro',16]]}),
 mkTrack({id:'t2',title:'Warm Static',artist:'Ines Duarte',bpm:122.6,key:'7A',dur:387,cat:'warmup',hasCues:true,
   energy:[.30,.34,.38,.44,.42,.48,.52,.50,.55,.58,.54,.48],
   phrases:[['Intro',16],['Verse',32],['Chorus',32],['Break',16],['Build',16],['Chorus',32],['Outro',16]]}),
 mkTrack({id:'t3',title:'Glasshouse',artist:'Pavel Kline',bpm:124.1,key:'7B',dur:421,cat:'build',hasCues:false,
   energy:[.42,.48,.55,.60,.58,.64,.70,.66,.72,.76,.70,.62],
   phrases:[['Intro',16],['Build',32],['Chorus',32],['Break',16],['Build',16],['Chorus',32],['Verse',16],['Outro',16]]}),
 mkTrack({id:'t4',title:'Meridian Drive',artist:'K. Mara',bpm:125.3,key:'8B',dur:396,cat:'build',hasCues:true,
   energy:[.58,.64,.70,.76,.72,.80,.86,.82,.88,.90,.86,.80],
   phrases:[['Intro',16],['Build',16],['Chorus',32],['Break',16],['Build',16],['Chorus',48],['Outro',16]]}),
 mkTrack({id:'t5',title:'Red Shift',artist:'Volta Era',bpm:126.0,key:'8A',dur:412,cat:'peak',hasCues:true,
   energy:[.74,.80,.86,.92,.88,.94,.97,.93,.96,.92,.86,.78],

/* ════════════════════════════════════════════════════════════
   Transition scorer — BPM / Camelot / energy, with human reasons
   (same voice as the product: "0.5 BPM difference — perfect")
   ════════════════════════════════════════════════════════════ */
function camelot(k){const m=/(\d+)([AB])/.exec(k);return{n:+m[1],l:m[2]};}
function scoreTransition(a,b){
  const reasons=[];let s=0;
  const d=Math.abs(a.bpm-b.bpm).toFixed(1);
  if(d<=0.5){s+=40;reasons.push({t:`<span class="mono">${d} BPM</span> difference — perfect`,c:'good'});}
  else if(d<=1.0){s+=36;reasons.push({t:`<span class="mono">${d} BPM</span> difference — easy nudge`,c:'good'});}
  else if(d<=2.0){s+=30;reasons.push({t:`<span class="mono">${d} BPM</span> difference — short pitch ride`,c:'good'});}
  else if(d<=4.0){s+=22;reasons.push({t:`<span class="mono">${d} BPM</span> apart — blend over 8–16 bars`,c:'warn'});}
  else{s+=10;reasons.push({t:`<span class="mono">${d} BPM</span> apart — needs half-time trick`,c:'warn'});}
  const ka=camelot(a.key),kb=camelot(b.key),kk=`<span class="mono">${a.key}→${b.key}</span>`;
  if(ka.n===kb.n&&ka.l===kb.l){s+=30;reasons.push({t:`${kk} — same key`,c:'good'});}
  else if(ka.n===kb.n){s+=27;reasons.push({t:`${kk} — parallel (same number)`,c:'good'});}
  else if(Math.abs(ka.n-kb.n)%11<=1&&ka.l===kb.l){s+=26;reasons.push({t:`${kk} — adjacent, harmonic`,c:'good'});}
  else{s+=10;reasons.push({t:`${kk} — key clash, EQ-kill mids`,c:'warn'});}
  const out=(a.energy[9]+a.energy[10]+a.energy[11])/3,
        inn=(b.energy[0]+b.energy[1]+b.energy[2])/3,
        delta=inn-out,pct=Math.round(Math.abs(delta)*100);
  if(delta>=0&&delta<=.18){s+=30;reasons.push({t:`Energy rises (<span class="mono">+${pct}%</span>) — momentum builds`,c:'good'});}
  else if(delta>-.08){s+=26;reasons.push({t:`Energy holds steady`,c:'good'});}
  else if(delta>-.22){s+=20;reasons.push({t:`Energy drops slightly (<span class="mono">−${pct}%</span>)`,c:'warn'});}
  else{s+=12;reasons.push({t:`Energy drops hard (<span class="mono">−${pct}%</span>) — reset moment`,c:'warn'});}
  return{score:Math.min(100,s),reasons};
}
const scoreClass=s=>s>=85?'s-good':s>=70?'s-ok':'s-bad';

/* ════════════════════════════════════════════════════════════
   Render — zones, arc, tiles, joints, inspector, tray
   ════════════════════════════════════════════════════════════ */
const $=s=>document.querySelector(s);
let selectedId=null, openJoint=null;

function fmtClock(sec){ // night starts 23:00
  const t=23*3600+sec,h=Math.floor(t/3600)%24,m=Math.floor(t%3600/60);
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}
function fmtDur(sec){const m=Math.floor(sec/60),s=Math.round(sec%60);return m+':'+String(s).padStart(2,'0');}

function energySVG(t,detail){
  const w=100,h=40,pts=t.energy.map((e,i)=>[(i/(t.energy.length-1))*w,h-4-e*(h-8)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path d="${line} L${w},${h} L0,${h} Z" fill="var(--green-wash)"/>
    <path d="${line}" fill="none" stroke="var(--green)" stroke-width="1.5" vector-effect="non-scaling-stroke" stroke-linejoin="round"/>
  </svg>`;
}

function renderZones(){
  const Z=[['warmup','z-warmup',.24],['build','z-build',.28],['peak','z-peak',.30],['closing','z-closing',.18]];
  $('#zones').innerHTML=Z.map(([n,c,f])=>
    `<div class="zone ${c}" style="width:${f*100}%"><span class="zone-label">${n}</span></div>`).join('');
}

function renderArc(){
  const total=SET.reduce((s,t)=>s+t.dur,0);
  const W=1000,H=84;let x=0;const pts=[];
  SET.forEach(t=>{
    const w=(t.dur/total)*W;
    t.energy.forEach((e,i)=>pts.push([x+(i/(t.energy.length-1))*w, H-8-e*(H-18)]));
    x+=w;
  });
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  $('#arc').setAttribute('viewBox',`0 0 ${W} ${H}`);
  $('#arc').innerHTML=
    `<path d="${d} L${W},${H} L0,${H} Z" fill="var(--green-wash)"/>
     <path d="${d}" fill="none" stroke="var(--green)" stroke-width="1.5" vector-effect="non-scaling-stroke" stroke-linejoin="round"/>`;
}

function renderTimeline(){
  const tl=$('#timeline');tl.innerHTML='';let elapsed=0;
  SET.forEach((t,i)=>{
    if(i>0){
      const j=scoreTransition(SET[i-1],t);
      const jb=document.createElement('button');
      jb.className='joint '+scoreClass(j.score);jb.dataset.idx=i-1;
      jb.setAttribute('aria-label',`Transition ${SET[i-1].title} → ${t.title}: ${j.score}/100`);
      jb.innerHTML=`${j.score}<small>/100</small>`;
      jb.addEventListener('click',e=>{e.stopPropagation();openJointPopover(jb,i-1);});
      tl.appendChild(jb);
    }
    const el=document.createElement('button');
    el.className='tile'+(t.id===selectedId?' selected':'');el.dataset.id=t.id;
    el.innerHTML=`
      <div class="tile-title">${t.title}</div>
      <div class="tile-artist">${t.artist}</div>
      <div class="chips">
        <span class="chip bpm">${t.bpm.toFixed(1)} BPM</span>
        <span class="chip">${t.key}</span>
        <span class="chip cat">${t.cat.replace('_',' ')}</span>
      </div>
      <div class="tile-energy">${energySVG(t)}</div>
      <div class="tile-foot">
        <span>${fmtClock(elapsed)}</span>
        <span class="${t.hasCues?'cue-ok':'cue-warn'}">${t.hasCues?t.cues.length+' cues ✓':'no cues'}</span>
      </div>`;
    el.addEventListener('click',()=>selectTile(t.id));
    tl.appendChild(el);
    elapsed+=t.dur;
  });
}

function renderStats(){
  const total=SET.reduce((s,t)=>s+t.dur,0);
  const bpms=SET.map(t=>t.bpm),scores=SET.slice(1).map((t,i)=>scoreTransition(SET[i],t).score);
  const avg=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
  const h=Math.floor(total/3600),m=Math.round(total%3600/60);
  const durLabel=h?`${h}h ${String(m).padStart(2,'0')}m`:`${m}m`;
  $('#set-stats').innerHTML=
    `<span class="stat-chip"><b>${SET.length}</b> tracks</span>
     <span class="stat-chip"><b>${durLabel}</b></span>
     <span class="stat-chip"><b>${Math.min(...bpms).toFixed(1)}–${Math.max(...bpms).toFixed(1)}</b> BPM</span>
     <span class="stat-chip health">avg mix <b>${avg}/100</b></span>`;
}

/* ── Joint popover with alternatives ── */
function openJointPopover(btn,idx){
  closePopover();
  openJoint=btn;btn.classList.add('open');
  const a=SET[idx],b=SET[idx+1],j=scoreTransition(a,b);
  const alts=POOL.filter(p=>!SET.some(s=>s.id===p.id))
    .map(p=>({t:p,s:scoreTransition(a,p).score}))
    .sort((x,y)=>y.s-x.s).slice(0,2);
  const po=$('#popover');
  po.innerHTML=`
    <div class="po-head">
      <div class="po-pair">${a.title} <span style="color:var(--muted)">→</span> ${b.title}</div>
      <div class="po-score ${scoreClass(j.score).replace('s-good','')}" style="color:${j.score>=85?'var(--green)':j.score>=70?'var(--warn-amber)':'var(--danger)'}">${j.score}<small>/100</small></div>
    </div>
    <ul>${j.reasons.map(r=>`<li class="${r.c}">${r.t}</li>`).join('')}</ul>
    <div class="po-alt-label">Swap the incoming track</div>
    ${alts.map(x=>`
      <div class="po-alt">
        <div class="a-meta">
          <div class="a-title">${x.t.title} — ${x.t.artist}</div>
          <div class="a-sub">${x.t.bpm.toFixed(1)} BPM · ${x.t.key}</div>
        </div>
        <span class="a-score" style="color:${x.s>=85?'var(--green)':x.s>=70?'var(--warn-amber)':'var(--danger)'}">${x.s}</span>
        <button class="swap-btn" data-swap="${x.t.id}" data-idx="${idx}">Swap in</button>
      </div>`).join('')}
    <div class="po-tip">💡 Mix out at <b>${b.cues[b.cues.length-1]?'cue '+a.cues[a.cues.length-1].slot:'the outro'}</b> — EQ-kill lows before <b>${b.title}</b>'s first chorus lands.</div>`;
  // position near the joint, clamped inside the canvas
  const canvas=$('#canvas'),cb=canvas.getBoundingClientRect(),bb=btn.getBoundingClientRect();
  let left=bb.left-cb.left+bb.width/2-165;
  left=Math.max(12,Math.min(left,canvas.clientWidth-342));
  po.style.left=left+'px';
  po.style.top=(bb.top-cb.top+bb.height+10)+'px';
  po.style.display='block';
  po.querySelectorAll('[data-swap]').forEach(sb=>sb.addEventListener('click',e=>{
    e.stopPropagation();
    const nt=POOL.find(p=>p.id===sb.dataset.swap),i=+sb.dataset.idx;
    const old=SET[i+1];POOL.push(old);POOL=POOL.filter(p=>p.id!==nt.id);
    SET[i+1]=nt;
    closePopover();renderAll();
    const ns=scoreTransition(SET[i],nt).score;
    toast(`Swapped in <b>${nt.title}</b> — joint re-scored <span class="mono">${ns}/100</span>`);
  }));
}
function closePopover(){
  $('#popover').style.display='none';
  if(openJoint){openJoint.classList.remove('open');openJoint=null;}
}
document.addEventListener('click',e=>{if(!e.target.closest('#popover'))closePopover();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePopover();selectTile(null);}});

/* ── Inspector: phrase strip + A–H cues in context ── */
function selectTile(id){
  selectedId=(selectedId===id)?null:id;
  document.querySelectorAll('.tile').forEach(el=>el.classList.toggle('selected',el.dataset.id===selectedId));
  renderInspector();renderTray();
}
function renderInspector(){
  const insp=$('#inspector'),t=SET.find(x=>x.id===selectedId);
  if(!t){insp.classList.remove('show');return;}
  const segs=t.phrases.map(p=>{
    const w=(p[1]/t.totalBars)*100,cls=p[0]==='Chorus'?'p-chorus':p[0]==='Build'?'p-build':p[0]==='Break'?'p-break':'';
    return `<div class="phrase-seg ${cls}" style="width:${w}%">${p[0]} ${p[1]}</div>`;
  }).join('');
  const ticks=t.cues.map(c=>{
    const col=`var(--cue-${c.slot.toLowerCase()})`;
    return `<div class="cue-tick" style="left:${(c.frac*100).toFixed(2)}%">
      <i style="background:${col}"></i>
      <b style="color:${col};border-color:${col};background:color-mix(in srgb, ${col} 8%, var(--surface))" title="${c.slot} — ${c.name} · ${fmtDur(c.frac*t.dur)}">${c.slot}</b>
    </div>`;
  }).join('');
  insp.innerHTML=`
    <div class="insp-head">
      <span class="insp-title">${t.title}</span>
      <span class="insp-artist">${t.artist}</span>
      <div class="chips">
        <span class="chip bpm">${t.bpm.toFixed(1)} BPM</span>
        <span class="chip">${t.key}</span>
        <span class="chip">${fmtDur(t.dur)}</span>
        <span class="chip cat">${t.cat}</span>
      </div>
      <div class="spacer"></div>
      <div class="insp-actions">
        <button class="ghost-pill" id="replace-cues">${t.hasCues?'Re-place cues':'✨ Generate cues'}</button>
        <button class="ghost-pill">≈ Similar</button>
      </div>
    </div>
    <div class="canvas-eyebrow"><span>Phrase structure · ${t.totalBars} bars</span><span class="hint mono" style="font-family:var(--font-mono)">${t.hasCues?t.cues.length+' cues placed':'preview — not written yet'}</span></div>
    <div class="phrase-wrap">
      <div class="phrase-strip">${segs}</div>
      ${ticks}
    </div>
    <div class="cue-list">
      ${t.cues.map(c=>{const col=`var(--cue-${c.slot.toLowerCase()})`;
        return `<span class="cue-pill" style="border-color:${col};background:color-mix(in srgb, ${col} 8%, var(--surface))">
          <span class="ltr" style="color:${col}">${c.slot}</span>
          <span class="nm">${c.name}</span>
          <span class="tm">${fmtDur(c.frac*t.dur)}</span></span>`;}).join('')}
    </div>
    <div class="insp-tip">💡 Mix in at <b>cue B (${t.cues[1].name})</b>, mix out from <b>cue ${t.cues[t.cues.length-1].slot} (${t.cues[t.cues.length-1].name})</b> — blend over 8–16 bars.</div>`;
  insp.classList.add('show');
  const rb=insp.querySelector('#replace-cues');
  rb.addEventListener('click',()=>{
    if(!t.hasCues){t.hasCues=true;renderAll();renderInspector();
      toast(`✨ Phrase analysis — <b>${t.cues.length} cues</b> placed on <b>${t.title}</b> (preview)`);}
    else toast(`Cues re-placed on <b>${t.title}</b> from phrase data (preview)`);
  });
}

/* ── Tray: what mixes out of the selected tile ── */
function renderTray(){
  const anchor=SET.find(x=>x.id===selectedId)||SET[SET.length-1];
  $('#tray-context').innerHTML=`— what mixes out of <b>${anchor.title}</b>? Drag (or Add) onto the timeline`;
  const ranked=POOL.filter(p=>!SET.some(s=>s.id===p.id))
    .map(p=>{const j=scoreTransition(anchor,p);return{t:p,s:j.score,r:j.reasons};})
    .sort((a,b)=>b.s-a.s).slice(0,6);
  $('#tray-row').innerHTML=ranked.map(x=>{
    const sim=(x.s/100*0.97+0.01).toFixed(2);
    const why=x.r.slice(0,2).map(r=>r.t.replace(/<[^>]+>/g,'')).join(' · ');
    return `<div class="crate-card" draggable="true">
      <div class="crate-title">${x.t.title}</div>
      <div class="crate-artist">${x.t.artist}</div>
      <div class="crate-reason"><span class="sim">≈ ${sim} similar</span> — ${why}</div>
      <div class="crate-foot">
        <span class="chip bpm">${x.t.bpm.toFixed(1)}</span>
        <span class="chip">${x.t.key}</span>
        <span class="chip mono" style="color:${x.s>=85?'var(--green)':x.s>=70?'var(--warn-amber)':'var(--danger)'}">${x.s}/100</span>
        <div class="spacer"></div>
        <button class="add-btn" data-add="${x.t.id}">Add →</button>
      </div></div>`;
  }).join('');
  $('#tray-row').querySelectorAll('[data-add]').forEach(b=>b.addEventListener('click',()=>{
    const nt=POOL.find(p=>p.id===b.dataset.add);
    POOL=POOL.filter(p=>p.id!==nt.id);
    const ai=SET.findIndex(s=>s.id===anchor.id);
    SET.splice(ai+1,0,nt);
    renderAll();
    toast(`<b>${nt.title}</b> placed after <b>${anchor.title}</b>`);
  }));
}
$('#tray-toggle').addEventListener('click',()=>{
  const tr=$('#tray');tr.classList.toggle('collapsed');
  $('#tray-toggle').textContent=tr.classList.contains('collapsed')?'Show ▴':'Hide ▾';
});

/* ── Export, theme, toast ── */
$('#export-btn').addEventListener('click',()=>{
  const n=SET.reduce((s,t)=>s+(t.hasCues?t.cues.length:0),0);
  const missing=SET.filter(t=>!t.hasCues).length;
  toast(missing
    ?`<span class="mono">${missing}</span> track needs cues — generate before export`
    :`Set exported — <span class="mono">${SET.length} tracks · ${n} cues</span> → import the XML in Rekordbox`);
});
$('#theme-toggle').addEventListener('click',()=>{
  const d=document.documentElement.classList.toggle('dark');
  $('#theme-toggle').textContent=d?'☾ Dark':'☀ Light';
});
let toastTimer;
function toast(html){
  const el=$('#toast');el.innerHTML=html;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),3200);
}

function renderAll(){renderZones();renderArc();renderTimeline();renderStats();renderTray();}
renderAll();
// start with the peak-time joint story visible: select Red Shift
selectTile('t5');
